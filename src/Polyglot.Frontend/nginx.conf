server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # The SPA calls the API on its own origin (window.location.origin) —
    # proxy /api through to the backend container.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE chat streaming must not be buffered
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # Service-worker control files must never be cached
    location ~* ^/(ngsw\.json|ngsw-worker\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Hashed build assets are immutable
    location ~* \.(?:js|css|png|svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
