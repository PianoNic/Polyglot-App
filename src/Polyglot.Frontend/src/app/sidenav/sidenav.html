<div hlmSidebarWrapper>
  <hlm-sidebar variant="inset">
    <hlm-sidebar-header>
      <ul hlmSidebarMenu>
        <li hlmSidebarMenuItem>
          <a hlmSidebarMenuButton size="lg" routerLink="/">
            <img src="icon.svg" alt="Polyglot" class="size-8" />
            <div class="grid flex-1 text-left text-sm leading-tight">
              <span class="truncate font-medium">Polyglot</span>
              <span class="truncate text-xs">Beta</span>
            </div>
          </a>
        </li>
        <li hlmSidebarMenuItem class="mt-4">
          <button hlmSidebarMenuButton type="button" (click)="newChat()">
            <ng-icon name="lucideSquarePen" />
            <span>New chat</span>
          </button>
        </li>
      </ul>
    </hlm-sidebar-header>

    <hlm-sidebar-content>
      <pk-conversation-list
        [conversations]="store.chats()"
        [activeId]="store.activeChatId()"
        (selected)="openConversation($event)"
        (renamed)="renameConversation($event)"
        (deleted)="deleteConversation($event)"
        class="flex-1"
      />
    </hlm-sidebar-content>

    <hlm-sidebar-footer>
      <ul hlmSidebarMenu>
        <li hlmSidebarMenuItem>
          <button hlmSidebarMenuButton size="lg" [hlmDropdownMenuTrigger]="userMenu" [side]="menuSide()" align="end">
            <hlm-avatar class="rounded-full">
              @if (user().avatar) {
                <img [src]="user().avatar" [alt]="user().name" hlmAvatarImage />
              }
              <span hlmAvatarFallback>{{ user().name.charAt(0).toUpperCase() }}</span>
            </hlm-avatar>
            <div class="grid flex-1 text-left text-sm leading-tight">
              <span class="truncate font-medium">{{ user().name }}</span>
              <span class="truncate text-xs tabular-nums">
                {{ userStore.creditBalance() | number }} credits
              </span>
            </div>
            <ng-icon name="lucideChevronsUpDown" class="ml-auto" />
          </button>

          <ng-template #userMenu>
            <hlm-dropdown-menu class="min-w-64">
              <hlm-dropdown-menu-label>{{ user().email }}</hlm-dropdown-menu-label>

              <hlm-dropdown-menu-separator />

              <hlm-dropdown-menu-group>
                <a hlmDropdownMenuItem routerLink="/chat">
                  <ng-icon name="lucideMessageCircle" />
                  Chat
                </a>
                <a hlmDropdownMenuItem routerLink="/admin">
                  <ng-icon name="lucideShield" />
                  Admin
                </a>
              </hlm-dropdown-menu-group>

              <hlm-dropdown-menu-separator />

              <hlm-dropdown-menu-group>
                <button hlmDropdownMenuItem>
                  <ng-icon name="lucideCoins" />
                  Buy tokens
                </button>
              </hlm-dropdown-menu-group>

              <hlm-dropdown-menu-separator />

              <hlm-dropdown-menu-group>
                @for (option of themeOptions; track option.mode) {
                  <button hlmDropdownMenuItem (click)="setTheme(option.mode)">
                    <ng-icon [name]="option.icon" />
                    {{ option.label }}
                    @if (themeMode() === option.mode) {
                      <span class="ml-auto text-xs text-muted-foreground">✓</span>
                    }
                  </button>
                }
              </hlm-dropdown-menu-group>

              <hlm-dropdown-menu-separator />

              <button hlmDropdownMenuItem (click)="logout()">
                <ng-icon name="lucideLogOut" />
                Log out
              </button>
            </hlm-dropdown-menu>
          </ng-template>
        </li>
      </ul>
    </hlm-sidebar-footer>
  </hlm-sidebar>

  <ng-content></ng-content>
</div>
